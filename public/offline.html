<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sem conexão — Mercadinho Tauan Pires</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: #fafaf9;
        color: #1c1917;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 32px;
      }
      .emoji { font-size: 48px; margin-bottom: 16px; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { font-size: 14px; color: #78716c; margin: 0 0 24px; max-width: 280px; }
      button {
        border: none;
        background: #166534;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        padding: 12px 24px;
        border-radius: 16px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="emoji">📡</div>
      <h1>Você está sem conexão</h1>
      <p>Verifique sua internet e tente novamente. Algumas páginas já visitadas podem continuar disponíveis.</p>
      <button onclick="location.reload()">Tentar novamente</button>
    </div>
  </body>
</html>
